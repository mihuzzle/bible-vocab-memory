let leftSel=null, rightSel=null, pairs=[];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
function newRound(){
  leftSel=rightSel=null;
  pairs = shuffle([...DATA]).slice(0,5);
  const L=document.getElementById('left');
  const R=document.getElementById('right');
  L.innerHTML=''; R.innerHTML='';
  pairs.forEach((p,i)=>{
    const c=document.createElement('div');c.className='card';c.textContent=p.fi;c.onclick=()=>selectLeft(c,i);
    L.appendChild(c);
  });
  shuffle([...pairs]).forEach((p)=>{
    const c=document.createElement('div');c.className='card';c.textContent=p.en;c.onclick=()=>selectRight(c,p);
    R.appendChild(c);
  });
}
function selectLeft(el,i){clearSel('left'); leftSel={el,i}; el.classList.add('selected')}
function selectRight(el,p){clearSel('right'); rightSel={el,p}; el.classList.add('selected'); check()}
function clearSel(side){document.querySelectorAll('#'+side+' .card').forEach(c=>c.classList.remove('selected'))}
function check(){ if(!leftSel||!rightSel) return; const ok = pairs[leftSel.i].en===rightSel.p.en;
  if(ok){ leftSel.el.classList.add('good'); rightSel.el.classList.add('good'); }
  else{ leftSel.el.classList.add('bad'); rightSel.el.classList.add('bad'); }
  setTimeout(newRound, ok?600:900);
}
